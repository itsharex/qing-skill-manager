<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <defs>
    <linearGradient id="trunk" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="root" x1="0.5" y1="0.5" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="branch" x1="0.5" y1="0.5" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="rootglow" cx="0.5" cy="0" r="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Black background -->
  <rect width="240" height="280" rx="18" fill="#111114"/>

  <!-- Subtle glow at root crown (top) -->
  <ellipse cx="120" cy="28" rx="80" ry="50" fill="url(#rootglow)"/>

  <!-- === ROOTS (top, spreading upward — inverted) === -->

  <!-- Central root — straight up -->
  <path d="M 120,110 C 120,85 120,55 120,22"
        fill="none" stroke="url(#root)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Central root fork left -->
  <path d="M 120,50 C 115,38 108,26 100,16"
        fill="none" stroke="url(#root)" stroke-width="2" stroke-linecap="round"/>
  <!-- Central root fork right -->
  <path d="M 120,50 C 125,38 132,26 140,16"
        fill="none" stroke="url(#root)" stroke-width="2" stroke-linecap="round"/>

  <!-- Left main root -->
  <path d="M 120,115 C 108,100 85,78 62,55"
        fill="none" stroke="url(#root)" stroke-width="3" stroke-linecap="round"/>
  <!-- Left root sub-branch up -->
  <path d="M 80,72 C 72,58 60,46 48,36"
        fill="none" stroke="url(#root)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Left root sub-branch left -->
  <path d="M 72,65 C 60,58 46,54 32,48"
        fill="none" stroke="url(#root)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left root tip fork -->
  <path d="M 62,55 C 55,44 46,34 38,24"
        fill="none" stroke="url(#root)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right main root -->
  <path d="M 120,115 C 132,100 155,78 178,55"
        fill="none" stroke="url(#root)" stroke-width="3" stroke-linecap="round"/>
  <!-- Right root sub-branch up -->
  <path d="M 160,72 C 168,58 180,46 192,36"
        fill="none" stroke="url(#root)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right root sub-branch right -->
  <path d="M 168,65 C 180,58 194,54 208,48"
        fill="none" stroke="url(#root)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Right root tip fork -->
  <path d="M 178,55 C 185,44 194,34 202,24"
        fill="none" stroke="url(#root)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Far-left thin root -->
  <path d="M 120,118 C 100,105 68,88 42,70"
        fill="none" stroke="url(#root)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 42,70 C 34,62 24,52 18,42"
        fill="none" stroke="url(#root)" stroke-width="1" stroke-linecap="round"/>

  <!-- Far-right thin root -->
  <path d="M 120,118 C 140,105 172,88 198,70"
        fill="none" stroke="url(#root)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 198,70 C 206,62 216,52 222,42"
        fill="none" stroke="url(#root)" stroke-width="1" stroke-linecap="round"/>

  <!-- === TRUNK (center) === -->
  <path d="M 120,110 L 120,185"
        fill="none" stroke="url(#trunk)" stroke-width="6" stroke-linecap="round"/>
  <!-- Slight trunk texture lines -->
  <path d="M 117,130 L 117,165" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <path d="M 123,125 L 123,170" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- === CANOPY / BRANCHES (bottom, spreading downward — inverted) === -->

  <!-- Left main branch -->
  <path d="M 120,180 C 105,195 78,212 52,228"
        fill="none" stroke="url(#branch)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 52,228 C 42,235 32,242 24,250"
        fill="none" stroke="url(#branch)" stroke-width="2" stroke-linecap="round"/>
  <!-- Left branch sub -->
  <path d="M 70,218 C 58,228 48,238 40,246"
        fill="none" stroke="url(#branch)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 85,208 C 78,218 68,230 62,240"
        fill="none" stroke="url(#branch)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Right main branch -->
  <path d="M 120,180 C 135,195 162,212 188,228"
        fill="none" stroke="url(#branch)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M 188,228 C 198,235 208,242 216,250"
        fill="none" stroke="url(#branch)" stroke-width="2" stroke-linecap="round"/>
  <!-- Right branch sub -->
  <path d="M 170,218 C 182,228 192,238 200,246"
        fill="none" stroke="url(#branch)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 155,208 C 162,218 172,230 178,240"
        fill="none" stroke="url(#branch)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Center-left drooping branch -->
  <path d="M 120,185 C 110,200 95,222 85,245"
        fill="none" stroke="url(#branch)" stroke-width="2" stroke-linecap="round"/>
  <!-- Center-right drooping branch -->
  <path d="M 120,185 C 130,200 145,222 155,245"
        fill="none" stroke="url(#branch)" stroke-width="2" stroke-linecap="round"/>
  <!-- Center drooping branch -->
  <path d="M 120,185 C 120,205 120,230 120,255"
        fill="none" stroke="url(#branch)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small leaf-like dots at branch tips (canopy) -->
  <circle cx="24" cy="252" r="2.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="40" cy="248" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="62" cy="242" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="85" cy="247" r="2.5" fill="#ffffff" opacity="0.22"/>
  <circle cx="120" cy="257" r="2.5" fill="#ffffff" opacity="0.25"/>
  <circle cx="155" cy="247" r="2.5" fill="#ffffff" opacity="0.22"/>
  <circle cx="178" cy="242" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="200" cy="248" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="216" cy="252" r="2.5" fill="#ffffff" opacity="0.25"/>

  <!-- Three root crown dots — 三花聚顶 -->
  <circle cx="100" cy="16" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="120" cy="12" r="3.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="140" cy="16" r="3" fill="#ffffff" opacity="0.6"/>
</svg>
